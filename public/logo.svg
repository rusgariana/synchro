<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant Synchro Gradients -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Left Calendar Circle -->
  <circle cx="196" cy="256" r="140" fill="url(#gradLeft)" fill-opacity="0.9" opacity="0.9" filter="url(#glow)" />
  <!-- Right Calendar Circle -->
  <circle cx="316" cy="256" r="140" fill="url(#gradRight)" fill-opacity="0.9" opacity="0.9" filter="url(#glow)" />
  
  <!-- Lock icon representing Privacy/PSI in the intersection -->
  <g filter="url(#glow)">
    <rect x="216" y="236" width="80" height="60" rx="16" fill="#ffffff" />
    <path d="M232 236 v-24 c0 -20 48 -20 48 0 v24" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
    <!-- Keyhole center dot -->
    <circle cx="256" cy="266" r="8" fill="#a855f7" />
  </g>
</svg>
